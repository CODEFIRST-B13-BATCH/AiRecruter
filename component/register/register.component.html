<div class="container-fluid">
    <div>
        <mat-card appearance="outlined" class="main">
            <div class="boundary">
                <span class="material-symbols-outlined">
                    potted_plant
                </span>
            </div>
            <div>
                <h1 style="font-weight: 700;text-align: center;font-family: sans-serif; margin-bottom: 20px;">CREATE
                    ACCOUNT</h1>
            </div>
            <div>
                <form class="example-form">
                    <table class="example-full-width" cellspacing="0">
                        <tr>
                            <td><mat-form-field class="example-full-width">
                                    <mat-label>First name</mat-label>
                                    <input matInput>
                                </mat-form-field></td>
                            <td><mat-form-field class="example-full-width">
                                    <mat-label>Last Name</mat-label>
                                    <input matInput>
                                </mat-form-field></td>
                        </tr>
                    </table>
                </form>
            </div>
            <div>
                <form class="example-form">
                    <mat-form-field class="example-full-width">
                        <mat-label>Phone No</mat-label>
                        <span matTextPrefix>+91 &nbsp;</span>
                        <input type="tel" matInput placeholder="555-555-1234">
                        <mat-icon matSuffix>mode_edit</mat-icon>
                    </mat-form-field>
                </form>
            </div>
            <div>
                <mat-form-field class="selector">
                    <mat-label>Select an option</mat-label>
                    <mat-select disableRipple>
                        <mat-option value="1">Farm Owner</mat-option>
                        <mat-option value="2">Farm Manager</mat-option>
                        <mat-option value="3">Farm worker</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <div>
                <form>
                    <div class="example-container">
                        <mat-form-field class="width">
                            <mat-label>Enter your password</mat-label>
                            <input matInput [type]="hide() ? 'password' : 'text'" />
                            <button mat-icon-button matSuffix (click)="clickEvent($event)"
                                [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide()">
                                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
                            </button>
                        </mat-form-field>
                    </div>

                </form>
            </div>
            <div>
                <mat-form-field class="width">
                    <mat-label>Confirm Password</mat-label>

                    <input matInput [type]="hideConfirmPassword ? 'password' : 'text'">

                    <button mat-icon-button matSuffix type="button"
                        (click)="hideConfirmPassword = !hideConfirmPassword">

                        <mat-icon>{{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>

                    </button>
                </mat-form-field>
            </div>
            <div class="example-button-row">
                <button mat-flat-button>Create Account</button>
            </div>
        </mat-card>
    </div>
</div>
