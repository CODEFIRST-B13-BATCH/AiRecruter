<div class="container-fluid">
    <div>
        <mat-card appearance="outlined" class="main">
            <mat-card-content>
                <div class="boundary">
                    <span class="material-symbols-outlined" style="font-size: 60px;">
                        potted_plant
                    </span>
                </div>
                <h1 style="font-weight: 700;text-align: center;color: chartreuse;">Welcome Back!</h1>
                <div>
                    <form class="example-form">
                        <div class="example-form-border">
                            <mat-form-field class="example-full-width">
                                <mat-label>Phone No</mat-label>
                                <span matTextPrefix>+91 &nbsp;</span>
                                <input type="tel" matInput placeholder="000-000-0000">
                                <mat-icon matSuffix>mode_edit</mat-icon>
                            </mat-form-field>
                        </div>
                    </form>
                </div>
                <div>
                    <div class="example-container">
                        <mat-form-field class="width">
                            <mat-label>Enter your password</mat-label>
                            <input matInput [type]="hide() ? 'password' : 'text'" />
                            <button mat-icon-button matSuffix (click)="clickEvent($event)"
                                [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide()">
                                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
                            </button>
                        </mat-form-field>
                        <P style="text-align: right;"><a href="#">Forget Password?</a></P>
                    </div>
                </div>
                <div style="margin-top:10px;">
                    <mat-checkbox>Remember me</mat-checkbox>
                </div>

                <div>
                    <div class="example-button-row">
                        <button mat-flat-button>LOGIN</button>
                    </div>
                    <div>
                        <h5 style="text-align: center;margin-top: 50px;">Don't have an account? <a href="../register/register.component.html">Register</a>
                        </h5>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
