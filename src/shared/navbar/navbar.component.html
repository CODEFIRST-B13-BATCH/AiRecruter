<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" opened class="sidebar">
    <!-- Sidebar Header -->
   <div class="logo">
  <span class="material-symbols-outlined logo-icon">potted_plant</span>

  <div class="logo-text">
    <h3>HydroGrow</h3>
    <p>OWNER PORTAL</p>
  </div>
</div>
 
    <mat-nav-list class="sidebar-menu">

  <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">dashboard</mat-icon>
    <span class="menu-text">Dashboard</span>
  </a>

  <a mat-list-item routerLink="/farms" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">agriculture</mat-icon>
    <span class="menu-text">Farms</span>
  </a>

  <a mat-list-item routerLink="/crops" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">eco</mat-icon>
    <span class="menu-text">Crops</span>
  </a>

  <a mat-list-item routerLink="/sensors" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">sensors</mat-icon>
    <span class="menu-text">Sensors</span>
  </a>

  <a mat-list-item routerLink="/alerts" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">notifications</mat-icon>
    <span class="menu-text">Alerts</span>
  </a>

  <a mat-list-item routerLink="/ai-tools" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon fontSet="material-symbols-outlined">psychology</mat-icon>
    <span class="menu-text">AI Tools</span>
  </a>

</mat-nav-list>
<div class="sidebar-footer">

  <div class="user-info">


    <div class="c">
      <div class="user-name">Hervest Forecast</div>
      <div class="user-role">Expected Yield:+15% This month</div>
      <div style="width:100%; aspect-ratio: 16 / 0.5; background:#74b53f;margin-top: 5px;"></div>
    </div>

  </div>

</div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <!-- Top Navigation -->
    <mat-toolbar class="navbar">
      <mat-form-field appearance="fill" class="search-bar">
        <mat-icon matPrefix class="search-icon" fontSet="material-symbols-outlined">search</mat-icon>

        <input matInput placeholder="Search systems, crops or alerts..." />
      </mat-form-field>

      <span class="spacer"></span>

      <button mat-icon-button class="notification-btn" aria-label="Notifications">
        <mat-icon fontSet="material-symbols-outlined">notifications</mat-icon>
        <span class="notification-dot" aria-hidden="true"></span>
      </button>

      <!-- Divider -->
      <div class="nav-divider"></div>

      <!-- User Info -->
      <div class="user-profile">
        <div class="user-text">
          <div class="user-name">James Farmworth</div>
          <div class="user-role">Senior Owner</div>
        </div>

        <!-- Avatar -->
        <div class="avatar">
          <img
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuATajDVNQH4Ld6WzoWilkABeJrwVvHLq3yYOz6TI1EcPBPeXZ7OB8aqnxtYwfNzG41IGo9Y1H99MQgCMbXmuRhiEtlz2tWAb27y9LSC4ug0TL9xT-mt8aJDoL_Zkm4_QdZ7X5nYOC5t0N1tNPVSWvvg7BWVV3oX_ziWFvU0g6bFRyLm_kWT1n7a3OlVsQntXL_aP1DLP2CzKEbFHGKTGE4fyEHXxq1cmFpXf4oaItibGakcdQrOeiE_8b0d0JXPBSxZ1A2X_r1CQRen"
          />
        </div>
      </div>
    </mat-toolbar>

    <!-- Page Content -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
