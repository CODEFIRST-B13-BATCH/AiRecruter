

<!-- 1. Interpolation -->
<p>Welcome to {{ name | uppercase }}!</p>
<p>{{currency | currency:'USD'}}</p>
<p>{{ currentDate|date:'mediumDate' }}</p>
<p>{{ currentDate| custPipe }}</p>

<!-- 2. Property Binding -->
<button [disabled]="isDisabled">Click Me</button>

<!-- 3. Event Binding -->
<button (click)="login($event)"> Login </button>
