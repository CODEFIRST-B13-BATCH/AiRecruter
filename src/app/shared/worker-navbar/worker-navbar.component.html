<!-- Sidebar -->

<mat-sidenav-container class="layout-container" autosize>
  <mat-sidenav
    #sidenav
    mode="side"
    [opened]="true"
    class="sidenav"
    [style.width.px]="isCollapsed ? 70 : 240"
  >
    <div class="sidebar-header">
      <button mat-icon-button (click)="toggleSidebar()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <!-- Menu -->
    <mat-list class="sidebar-menu">
      <a mat-list-item routerLink="/worker/daily-task">
        <mat-icon>dashboard</mat-icon>
        <span class="menu-text">Dashboard</span>
      </a>

      <a mat-list-item routerLink="/worker/daily-task">
        <mat-icon>task_alt</mat-icon>
        <span class="menu-text">Daily Task</span></a
      >

      <a mat-list-item routerLink="/myfarm">
        <mat-icon>agriculture</mat-icon>
        <span class="menu-text">My Farms</span>
      </a>

      <a mat-list-item routerLink="/worker/activitylog">
        <mat-icon>history_edu</mat-icon>
        <span class="menu-text">Activity Logs</span>
      </a>
    </mat-list>
    <!-- upload section -->

  <mat-card class="upload-card">

  <!-- Title -->
  <div class="upload-header">
    <mat-icon class="cloud-icon">cloud_upload</mat-icon>
    <span class="title">Quick Upload</span>
  </div>

  <!-- Subtitle -->
  <p class="subtitle">
    Upload crop health photos for instant analysis.
  </p>

  <!-- Upload Box -->
  <div class="upload-box" (click)="fileInput.click()">

    <mat-icon class="upload-icon">photo_camera</mat-icon>

    <span class="upload-text">DROP PHOTO</span>

    <input
      type="file"
      #fileInput
      hidden
      (change)="onFileSelected($event)"
    />

  </div>

</mat-card>

    <!-- Hidden input -->
  </mat-sidenav>

  <mat-sidenav-content> </mat-sidenav-content>
</mat-sidenav-container>
