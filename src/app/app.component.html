<div class="main-container" style="display: flex; flex-direction: row; height: 100vh; width: 100vw; overflow: hidden;">
  
  <ng-container *ngIf="showNav()">
    <div style="width: 240px; flex-shrink: 0; height: 100%;">
      <app-admin-navabr *ngIf="userRole === 'admin'"></app-admin-navabr>
      <app-worker-navbar *ngIf="userRole === 'farm-worker'"></app-worker-navbar>
      <app-navbar *ngIf="userRole === 'farm-owner'"></app-navbar>
    </div>
  </ng-container>

  <main class="page-content" style="flex-grow: 1; height: auto; overflow-y: auto; padding: 20px;">
    <router-outlet/>
  </main>
</div>
